<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансы</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Кредитки -->
<div id="cards-page" class="app">
<h1>Кредитки</h1>

<div class="input-group">
<label>Название карты</label>
<input id="cardName">

<label>Долг</label>
<input id="amount" type="number">

<label>Лимит</label>
<input id="limit" type="number">

<label>Дата списания</label>
<input id="dueDate" type="date">

<button onclick="addCard()">Добавить</button>
</div>

<div class="totals credit-totals">
<div>Общий долг: <span id="totalDebt">0</span> ₽</div>
<div>Остаток по лимитам: <span id="totalFree">0</span> ₽</div>
</div>

<div id="cardList"></div>
</div>

<!-- Подписки -->
<div id="subs-page" class="app hidden">
<h1>Подписки</h1>

<div class="input-group">
<label>Название подписки</label>
<input id="subName">

<label>Сумма</label>
<input id="subPrice" type="number">

<label>Дата списания</label>
<input id="subDate" type="date">

<button onclick="addSub()">Добавить</button>
</div>

<div class="totals subs-totals">
<div>Ежемесячная плата: <span id="subSum">0</span> ₽</div>
</div>

<ul id="subList"></ul>
</div>

<!-- Модалка -->
<div id="modal" class="modal">
<div class="modal-content">

<label>Название</label>
<input id="editName">

<label id="editValueLabel">Сумма</label>
<input id="editValue" type="number">

<label>Дата</label>
<input id="editDate" type="date">

<div class="modal-actions">
<button onclick="cancelEdit()">Отменить</button>
<button onclick="saveEdit()">Сохранить</button>
</div>

</div>
</div>

<!-- Навигация -->
<nav>
<button onclick="showPage('cards')">💳 Кредитки</button>
<button onclick="showPage('subs')">📅 Подписки</button>
</nav>

<script src="app.js"></script>
</body>
</html>
