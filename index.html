<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>Credit Tracker</h1>

  <div class="input-group">
    <input id="cardName" placeholder="Карта" />
    <input id="amount" type="number" placeholder="Долг" />
    <input id="limit" type="number" placeholder="Лимит" />
    <input id="days" type="number" placeholder="Дни" />
    <button onclick="addDebt()">+</button>
  </div>

  <div class="stats">
    <div id="total">0 ₽</div>
    <div id="free">0 ₽</div>
  </div>

  <canvas id="chart" width="320" height="320"></canvas>

  <ul id="debtList"></ul>
</div>

<script src="script.js" defer></script>
</body>
</html>
